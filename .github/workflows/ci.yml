name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
    
    - name: Create build directory
      run: mkdir -p build && cd build
    
    - name: Configure CMake
      run: cd build && cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON ..
    
    - name: Build
      run: cd build && make -j$(nproc)
    
    - name: Run tests
      run: cd build && ./tests/logger_tests
